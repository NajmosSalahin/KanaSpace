/* ================================================================
   1. RESET & BOX MODEL
================================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{zoom:1.05}

/* ================================================================
   2. CSS VARIABLE SYSTEM — 38 THEMES
   KanaDiary's rich palette + auto-derived Kanaflow bridge vars
================================================================ */
:root{
  --bg:#0d1117;--card:rgba(22,27,34,0.7);--card-hover:rgba(33,38,45,0.9);
  --text:#e6edf3;--muted:#7d8590;--border:rgba(255,255,255,0.1);
  --c1:#58a6ff;--c2:#3fb950;--c3:#d2a8ff;--c4:#ff7b72;--c5:#f2cc60;--c6:#38bdf8;
  --shadow-color:rgba(0,0,0,0.3);--bg-grad-alpha:12%;
}

/* Bridge vars (auto-derived, never need per-theme overrides) */
body{
  --bg2:color-mix(in srgb,var(--bg) 88%,var(--text));
  --bg3:var(--card);--bg4:var(--card-hover);
  --b1:var(--border);--b2:color-mix(in srgb,var(--text) 16%,transparent);
  --t1:var(--text);--t2:var(--muted);
  --t3:color-mix(in srgb,var(--muted) 55%,transparent);
  --ac:var(--c1);
  --ac-d:color-mix(in srgb,var(--c1) 12%,transparent);
  --ac-g:color-mix(in srgb,var(--c1) 5%,transparent);
  --gr:#4caf7d;--gr-d:rgba(76,175,125,0.12);
  --rd:#e05c5c;--rd-d:rgba(224,92,92,0.12);
  --kana-font:'Noto Sans JP',sans-serif;
}

.kf-zen-old .kana-char,.kf-zen-old #kc{font-family:'Zen Old Mincho',serif}
.kf-kaisei .kana-char,.kf-kaisei #kc{font-family:'Kaisei Decol',serif}
.kf-yusei .kana-char,.kf-yusei #kc{font-family:'Yusei Magic',sans-serif}
.kf-hachimaru .kana-char,.kf-hachimaru #kc{font-family:'Hachi Maru Pop',cursive}
.kf-potta .kana-char,.kf-potta #kc{font-family:'Potta One',sans-serif}
.kf-rocknroll .kana-char,.kf-rocknroll #kc{font-family:'RocknRoll One',sans-serif}
.kf-train .kana-char,.kf-train #kc{font-family:'Train One',sans-serif}
.kf-dela .kana-char,.kf-dela #kc{font-family:'Dela Gothic One',sans-serif}
.kf-rampart .kana-char,.kf-rampart #kc{font-family:'Rampart One',sans-serif}
.kf-reggae .kana-char,.kf-reggae #kc{font-family:'Reggae One',sans-serif}
.kf-stick .kana-char,.kf-stick #kc{font-family:'Stick',sans-serif}
.kf-dotgothic .kana-char,.kf-dotgothic #kc{font-family:'DotGothic16',monospace}

/* ================================================================
   4. GLOBAL LAYOUT & BODY
================================================================ */
body{
  font-family:'Figtree',system-ui,sans-serif;
  background:var(--bg);
  background-image:
    radial-gradient(circle at 10% 20%,color-mix(in srgb,var(--c1) var(--bg-grad-alpha),transparent),transparent 50%),
    radial-gradient(circle at 90% 80%,color-mix(in srgb,var(--c3) var(--bg-grad-alpha),transparent),transparent 50%);
  background-attachment:fixed;
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  transition:background-color 0.45s ease,color 0.45s ease
}

.app-container{max-width:980px;margin:0 auto;padding:0 20px 60px;width:100%;flex:1}

/* ================================================================
   5. HEADER
================================================================ */
.site-header{
  padding:28px 0 0;
  margin-bottom:28px
}
.header-top{
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;flex-wrap:wrap;margin-bottom:20px
}
.brand h1{
  font-size:2rem;font-weight:600;letter-spacing:-0.04em;
  color:var(--text);
  text-shadow:0 4px 24px color-mix(in srgb,var(--c1) 30%,transparent);
  line-height:1
}
.brand p{
  font-size:0.85rem;color:var(--muted);font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;margin-top:4px
}
.header-controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}

/* ── Tab Navigation ── */
.tab-nav{
  display:flex;gap:6px;
  background:color-mix(in srgb,var(--card) 60%,transparent);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border);
  border-radius:16px;padding:5px;
  box-shadow:0 4px 20px var(--shadow-color);
  width:fit-content
}
.tab-btn{
  font-family:inherit;font-size:0.92rem;font-weight:600;
  padding:9px 22px;border-radius:11px;border:none;
  background:transparent;color:var(--muted);
  cursor:pointer;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
  display:flex;align-items:center;gap:7px;white-space:nowrap
}
.tab-btn:hover{color:var(--text);background:color-mix(in srgb,var(--text) 8%,transparent)}
.tab-btn.active{
  background:var(--c1);color:#fff;
  box-shadow:0 4px 14px color-mix(in srgb,var(--c1) 40%,transparent)
}

/* ── Tab Content ── */
.tab-content{display:none;animation:tabIn 0.28s ease}
.tab-content.active{display:block}
@keyframes tabIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ================================================================
   6. CUSTOM DROPDOWN CONTROLS (Theme + Font)
================================================================ */
.ctrl-btn{
  background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border);color:var(--muted);
  padding:9px 18px;border-radius:12px;
  font-family:inherit;font-size:0.9rem;font-weight:600;
  cursor:pointer;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
  outline:none;box-shadow:0 4px 20px var(--shadow-color);
  display:flex;align-items:center;gap:8px
}
.ctrl-btn:hover,.ctrl-btn.open{
  border-color:color-mix(in srgb,var(--c1) 60%,transparent);
  color:var(--text);
  background:var(--card-hover);
  box-shadow:0 6px 16px color-mix(in srgb,var(--c1) 20%,transparent)
}
.ctrl-btn .chev{transition:transform 0.25s ease;opacity:0.6}
.ctrl-btn.open .chev{transform:rotate(180deg)}

.dropdown-wrap{position:relative}
.dropdown-menu{
  position:absolute;top:calc(100% + 10px);right:0;
  background:var(--card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border);border-radius:16px;
  padding:8px;min-width:230px;max-height:52vh;overflow-y:auto;
  box-shadow:0 16px 48px var(--shadow-color);z-index:1000;
  opacity:0;visibility:hidden;
  transform:translateY(-10px) scale(0.97);
  transition:all 0.22s cubic-bezier(0.16,1,0.3,1);
  transform-origin:top right;display:flex;flex-direction:column;gap:3px
}
.dropdown-wrap.open .dropdown-menu{opacity:1;visibility:visible;transform:translateY(0) scale(1)}
.dropdown-menu::-webkit-scrollbar{width:5px}
.dropdown-menu::-webkit-scrollbar-track{background:transparent;margin:6px 0}
.dropdown-menu::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}

.d-opt{
  padding:10px 14px;border-radius:9px;cursor:pointer;
  font-size:0.9rem;font-weight:500;color:var(--muted);
  transition:all 0.18s ease;display:flex;align-items:center;
  justify-content:space-between;outline:none;gap:8px
}
.d-opt .opt-l{display:flex;align-items:center;gap:8px}
.d-opt:hover,.d-opt:focus-visible{background:color-mix(in srgb,var(--text) 6%,transparent);color:var(--text)}
.d-opt.sel{background:color-mix(in srgb,var(--c1) 14%,transparent);color:var(--c1);font-weight:700}
.d-opt.sel::after{content:'✔';font-size:0.85rem;color:var(--c2);font-family:system-ui}
.d-sep{
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.15em;
  text-transform:uppercase;color:var(--muted);opacity:0.6;
  padding:8px 14px 4px;
}
.font-prev{font-size:1.1rem;line-height:1;width:20px;text-align:center}
.theme-swatch{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ================================================================
   7. REFERENCE TAB — KanaDiary Grid
================================================================ */
.ref-controls{
  display:flex;flex-wrap:wrap;gap:14px;
  justify-content:space-between;align-items:center;
  margin-bottom:32px
}
.ref-controls-left,.ref-controls-right{display:flex;gap:12px;flex-wrap:wrap;align-items:center}

.seg-ctrl{
  display:flex;flex-wrap:wrap;justify-content:center;
  background:color-mix(in srgb,var(--card) 50%,transparent);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:14px;
  padding:5px;gap:3px;box-shadow:0 4px 20px var(--shadow-color)
}
.seg-ctrl .seg-btn{
  font-family:inherit;font-size:0.88rem;font-weight:600;
  padding:8px 16px;border-radius:9px;border:none;
  background:transparent;color:var(--muted);cursor:pointer;
  transition:all 0.22s ease;white-space:nowrap
}
.seg-ctrl .seg-btn:hover{background:color-mix(in srgb,var(--text) 8%,transparent);color:var(--text)}
.seg-ctrl .seg-btn.active{background:var(--c1);color:#fff;box-shadow:0 3px 12px color-mix(in srgb,var(--c1) 40%,transparent)}

.script-btn{
  background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border);color:var(--muted);
  padding:10px 20px;border-radius:12px;
  font-family:inherit;font-size:0.9rem;font-weight:600;
  cursor:pointer;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 4px 20px var(--shadow-color)
}
.script-btn:hover{
  border-color:color-mix(in srgb,var(--c1) 60%,transparent);
  color:var(--text);background:var(--card-hover);
  transform:translateY(-2px);
  box-shadow:0 6px 16px color-mix(in srgb,var(--c1) 20%,transparent)
}

.chart-card{
  background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:22px;
  padding:28px;box-shadow:0 8px 32px var(--shadow-color)
}
.kana-grid{display:grid;grid-template-columns:24px repeat(5,1fr);gap:12px;align-items:center}

.grid-hdr{
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-weight:700;
  font-size:0.9rem;text-transform:lowercase;opacity:0.55;user-select:none
}
.col-hdr{color:var(--c3)}.row-hdr{color:var(--c4)}

.kana-cell{
  position:relative;aspect-ratio:1/1.1;padding:14px 6px;text-align:center;
  border-radius:14px;background:color-mix(in srgb,var(--bg) 40%,transparent);
  border:1px solid var(--border);cursor:pointer;
  transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;overflow:hidden
}
.kana-cell.empty{visibility:hidden;pointer-events:none}
.kana-cell::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at top left,color-mix(in srgb,var(--c1) 20%,transparent),transparent 70%);
  opacity:0;transition:opacity 0.25s ease
}
.kana-cell:hover{
  transform:translateY(-3px) scale(1.04);
  border-color:color-mix(in srgb,var(--c1) 70%,transparent);
  box-shadow:0 10px 20px color-mix(in srgb,var(--c1) 22%,transparent);
  background:var(--card-hover);z-index:2
}
.kana-cell:hover::before{opacity:1}
.kana-cell:active{transform:translateY(0) scale(0.97)}

.kana-char{
  position:relative;font-size:clamp(2.5rem, 5vw, 4rem);line-height:1;
  color:var(--text);font-weight:500;
  transition:color 0.25s ease;z-index:1
}
.kana-romaji{
  position:relative;font-size:0.78rem;
  font-family:'JetBrains Mono',monospace;
  color:var(--muted);font-weight:600;
  letter-spacing:0.05em;z-index:1;text-transform:lowercase
}
.kana-cell:hover .kana-char{color:var(--c1);text-shadow:0 0 12px color-mix(in srgb,var(--c1) 40%,transparent)}
.kana-cell:hover .kana-romaji{color:var(--c2)}

/* Info button */
.info-btn{
  position:absolute;top:5px;right:5px;
  background:color-mix(in srgb,var(--card) 60%,transparent);
  border:1px solid color-mix(in srgb,var(--border) 60%,transparent);
  border-radius:50%;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);cursor:pointer;transition:all 0.2s ease;
  opacity:0;z-index:10;outline:none
}
.kana-cell:hover .info-btn,.info-btn:focus-visible{opacity:0.7}
.info-btn:hover,.info-btn:focus-visible{
  background:var(--c3);color:#fff;border-color:var(--c3);
  transform:scale(1.1);opacity:1
}

/* Pronunciation Tooltip */
.pron-tip{
  position:fixed;
  background:var(--card-hover);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--c1);color:var(--text);
  padding:14px 18px;border-radius:16px;
  font-family:'Figtree',sans-serif;pointer-events:none;
  opacity:0;transform:translateY(10px) scale(0.95);
  transition:all 0.2s cubic-bezier(0.16,1,0.3,1);
  z-index:9999;
  box-shadow:0 10px 40px var(--shadow-color),0 0 20px color-mix(in srgb,var(--c1) 25%,transparent);
  display:flex;flex-direction:column;gap:10px;
  min-width:220px;max-width:320px
}
.pron-tip.visible{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.tip-header{display:flex;align-items:center}
.romaji-hl{
  color:var(--c5);font-family:'JetBrains Mono',monospace;
  font-weight:700;font-size:1.1rem;
  background:color-mix(in srgb,var(--c5) 15%,transparent);
  padding:3px 11px;border-radius:7px;text-transform:lowercase
}
.tip-desc{font-size:0.9rem;color:var(--text);line-height:1.5;font-weight:500}
.tip-examples{
  display:flex;flex-direction:column;gap:6px;margin-top:2px;padding-top:10px;
  border-top:1px dashed color-mix(in srgb,var(--border) 100%,transparent)
}
.ex-item{
  display:grid;grid-template-columns:minmax(55px,auto) minmax(55px,auto) 1fr;
  align-items:center;gap:12px;
  background:color-mix(in srgb,var(--bg) 60%,transparent);
  padding:8px 12px;border-radius:8px;
  border:1px solid color-mix(in srgb,var(--border) 60%,transparent);
  cursor:pointer;transition:all 0.18s ease
}
.ex-item:hover,.ex-item:focus-visible{
  background:color-mix(in srgb,var(--card-hover) 80%,transparent);
  border-color:color-mix(in srgb,var(--c1) 50%,transparent);
  transform:translateX(3px);outline:none
}
.ex-jp{font-weight:600;font-family:'Noto Sans JP',sans-serif;color:var(--text);font-size:0.95rem}
.ex-ro{color:var(--c2);font-family:'JetBrains Mono',monospace;font-size:0.8rem;font-weight:600}
.ex-en{color:var(--c4);font-size:0.8rem;font-style:italic;text-align:right;line-height:1.2}

/* ================================================================
   8. PRACTICE TAB — Kanaflow Quiz
================================================================ */
.practice-layout{display:flex;gap:18px;align-items:flex-start}
.quiz-card{
  flex:1;min-width:0;background:var(--bg2);
  border:1px solid var(--b1);border-radius:16px;
  padding:22px;position:relative;overflow:hidden
}
.quiz-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,var(--ac-g) 0%,transparent 55%);
  pointer-events:none
}

/* Stats row */
.stats-row{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.stat-chip{
  font-family:'JetBrains Mono',monospace;font-size:12px;
  color:var(--t2);background:var(--bg3);border:1px solid var(--b1);
  border-radius:6px;padding:3px 9px;white-space:nowrap
}
.stat-chip span{color:var(--t1);font-weight:600}
.acc-bar{flex:1;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.acc-fill{height:100%;background:var(--ac);border-radius:2px;width:0;transition:width 0.5s ease}
.streak{
  display:flex;align-items:center;gap:5px;
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;
  padding:3px 9px;border-radius:6px;
  background:var(--bg3);border:1px solid var(--b1);color:var(--t2);
  transition:all 0.3s;white-space:nowrap
}
.streak.hot{background:var(--ac-d);border-color:var(--ac);color:var(--ac)}
.s-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);transition:background 0.3s}
.streak.hot .s-dot{background:var(--ac)}

/* Kana display area */
.kana-area{display:flex;flex-direction:column;align-items:center;padding:18px 0 8px}
.type-label{
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;
  letter-spacing:0.2em;text-transform:uppercase;color:var(--t2);margin-bottom:14px
}
#kc{
  font-size:clamp(4.5rem,12vw,6rem);line-height:1;
  color:var(--t1);cursor:default;user-select:none;font-weight:400;
  transition:color 0.15s;font-family:'Noto Sans JP',sans-serif
}
#kc.kin{animation:kIn 0.22s ease forwards}
@keyframes kIn{from{opacity:0;transform:translateY(7px) scale(0.93)}to{opacity:1;transform:none}}
#kc.shk{animation:shk 0.3s ease}
@keyframes shk{0%,100%{transform:none}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
#kc.cfl{animation:cf 0.28s ease}
@keyframes cf{0%,100%{color:var(--t1)}50%{color:var(--gr)}}

.reveal-hint{
  height:18px;margin-top:12px;
  font-family:'JetBrains Mono',monospace;font-size:13px;
  color:var(--ac);letter-spacing:0.1em;
  opacity:0;transition:opacity 0.18s;pointer-events:none
}
.reveal-hint.show{opacity:1}

.kana-btns{display:flex;gap:5px;margin-top:10px}
.kbtn{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  padding:4px 10px;border-radius:5px;
  border:1px solid var(--b2);background:transparent;
  color:var(--t3);cursor:pointer;transition:all 0.14s
}
.kbtn:hover{background:var(--bg3);color:var(--t2)}
.kbtn:active{transform:scale(0.95)}
.kbtn-sound{color:var(--ac);border-color:var(--ac-d)}
.kbtn-sound:hover{background:var(--ac-d)}
.kbtn-sound.pulse{animation:sp 0.45s ease}
@keyframes sp{0%,100%{opacity:1}50%{opacity:0.45}}

/* Input */
.input-area{margin-top:14px}
.input-wrap{position:relative;display:flex;align-items:center}
#inp{
  width:100%;background:var(--bg3);
  border:1px solid var(--b2);border-radius:10px;
  padding:0.78rem 2.4rem 0.78rem 1rem;
  font-family:'JetBrains Mono',monospace;font-size:1rem;
  color:var(--t1);outline:none;
  transition:border-color 0.18s,box-shadow 0.18s;
  letter-spacing:0.05em;caret-color:var(--ac)
}
#inp::placeholder{color:var(--t3)}
#inp:focus{border-color:var(--ac-d);box-shadow:0 0 0 3px var(--ac-g)}
#inp.ok{border-color:var(--gr-d);box-shadow:0 0 0 3px rgba(76,175,125,0.05)}
#inp.no{border-color:var(--rd-d);box-shadow:0 0 0 3px rgba(224,92,92,0.05)}
.ent-hint{
  position:absolute;right:10px;
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);pointer-events:none
}
kbd{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  background:var(--bg4);border:1px solid var(--b2);
  border-radius:3px;padding:1px 4px;color:var(--t3)
}
.cf-row{
  display:flex;justify-content:center;gap:2px;
  margin-top:6px;min-height:16px;
  font-family:'JetBrains Mono',monospace;font-size:0.78rem;letter-spacing:0.15em
}
.c-ok{color:var(--gr)}.c-no{color:var(--rd);text-decoration:underline}

.quiz-msg{
  text-align:center;margin-top:10px;
  font-family:'JetBrains Mono',monospace;font-size:12px;
  min-height:18px;color:var(--t2)
}
.quiz-msg.err{color:var(--rd)}
.quiz-msg .ans{font-weight:700;color:var(--ac)}

.act-row{display:flex;justify-content:center;gap:8px;margin-top:14px}
.q-btn{
  font-family:'Figtree',sans-serif;font-size:13px;font-weight:500;
  padding:6px 15px;border-radius:8px;
  border:1px solid var(--b2);background:transparent;
  color:var(--t2);cursor:pointer;transition:all 0.14s
}
.q-btn:hover{background:var(--bg3);color:var(--t1)}
.q-btn:active{transform:scale(0.97)}
.q-btn-rev{color:var(--ac);border-color:var(--ac-d)}
.q-btn-rev:hover{background:var(--ac-d)}
.q-btn-skip{color:var(--rd);border-color:var(--rd-d);background:var(--rd-d)}
.q-btn-skip:hover{opacity:0.8}
.q-btn-reset{color:var(--t3);border-color:var(--b1);font-size:11px;padding:4px 10px}
.q-btn-reset:hover{color:var(--t2)}

/* ── Options Panel ── */
.opt-panel{width:285px;flex-shrink:0}
.opt-toggle{
  width:100%;background:var(--bg2);border:1px solid var(--b1);
  border-radius:10px;padding:10px 14px;
  font-family:'Figtree',sans-serif;font-size:13px;font-weight:500;
  color:var(--t2);cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  transition:all 0.14s;margin-bottom:6px
}
.opt-toggle:hover{background:var(--bg3);color:var(--t1)}
.opt-toggle .chev{transition:transform 0.2s;font-size:10px;color:var(--t3)}
.opt-toggle.open .chev{transform:rotate(180deg)}
.opt-body{background:var(--bg2);border:1px solid var(--b1);border-radius:12px;overflow:hidden;display:none}
.opt-body.open{display:block}

/* Kana selection grid */
.ksec{padding:10px 14px;border-bottom:1px solid var(--b1)}
.ksec:last-child{border-bottom:none}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.sec-ttl{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:0.2em;text-transform:uppercase;color:var(--t1);font-weight:500
}
.clinks{display:flex;gap:6px}
.clink{
  font-size:11px;cursor:pointer;opacity:0.65;transition:opacity 0.14s;
  background:none;border:none;font-family:'Figtree',sans-serif;padding:0;color:var(--t2)
}
.clink:hover{opacity:1}
.clink-on{color:var(--ac)}
.clink-off:hover{color:var(--t2)}

.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:3px}
.kopt{position:relative}
.kopt input{position:absolute;opacity:0;width:0;height:0}
.klbl{
  display:flex;flex-direction:column;align-items:center;
  padding:5px 3px;border-radius:6px;
  border:1px solid var(--b1);background:var(--bg3);
  cursor:pointer;transition:all 0.14s;width:100%;gap:1px
}
.kopt input:checked+.klbl{background:var(--ac-d);border-color:var(--ac)}
.klbl:hover{border-color:var(--b2);background:var(--bg4)}
.kjp{font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--t1);line-height:1}
.krm{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t2);font-weight:500;line-height:1}

/* Keyboard help */
.kbhelp{padding:8px 14px;font-size:11px;color:var(--t3);display:flex;flex-direction:column;gap:3px;font-family:'JetBrains Mono',monospace}
.kbr{display:flex;align-items:center;gap:5px}

/* Quiz hover tooltip */
#quiz-tt{
  position:fixed;z-index:9999;
  background:var(--bg4);border:1px solid var(--b2);
  border-radius:9px;padding:8px 11px;pointer-events:none;display:none;
  grid-template-columns:auto auto;gap:3px 10px;
  box-shadow:0 8px 24px rgba(0,0,0,0.45);min-width:60px
}
.tt-jp{font-family:'Noto Sans JP',sans-serif;font-size:16px;color:var(--t1);line-height:1.6;text-align:right}
.tt-rm{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ac);line-height:1.6;align-self:center}

/* ================================================================
   9. FOOTER
================================================================ */
.footer{
  margin-top:40px;padding:24px;text-align:center;
  border-top:1px solid var(--border);
  display:flex;flex-wrap:wrap;justify-content:center;gap:20px;
  font-size:0.88rem;
  background:color-mix(in srgb,var(--bg) 80%,transparent);
  backdrop-filter:blur(10px)
}
.footer a{
  color:var(--muted);text-decoration:none;transition:all 0.2s ease;
  font-weight:600;display:inline-flex;align-items:center;gap:5px
}
.footer a:hover{color:var(--c6);text-shadow:0 0 10px color-mix(in srgb,var(--c6) 40%,transparent)}

/* ================================================================
   10. RESPONSIVE
================================================================ */
@media(max-width:700px){
  .practice-layout{flex-direction:column}
  .opt-panel{width:100%}
  .header-top{justify-content:center;text-align:center}
  .brand{text-align:center}
  .header-controls{justify-content:center}
  .ref-controls{justify-content:center}
  .kana-grid{grid-template-columns:16px repeat(5,1fr);gap:7px}
  .kana-char{font-size:clamp(2.5rem, 5vw, 4rem);}
  .kana-romaji{font-size:0.7rem}
  .kana-cell{padding:10px 4px;border-radius:10px}
  .chart-card{padding:18px 14px}
  .info-btn{opacity:0.45;width:20px;height:20px}
  .info-btn svg{width:10px;height:10px}
  /* Mobile dropdown modal */
  .dropdown-menu{
    position:fixed;top:50%!important;left:50%!important;
    right:auto!important;bottom:auto!important;
    width:92vw!important;max-width:520px;max-height:65vh!important;
    transform:translate(-50%,-40%) scale(0.95)!important;
    border-radius:20px!important;z-index:10000!important;
    box-shadow:0 10px 40px rgba(0,0,0,0.5),0 0 0 2000px rgba(0,0,0,0.35)!important
  }
  .dropdown-wrap.open .dropdown-menu{transform:translate(-50%,-50%) scale(1)!important}
  /* Mobile tooltip */
  .pron-tip{
    left:50%!important;top:auto!important;bottom:16px!important;
    transform:translate(-50%,20px) scale(0.95)!important;
    width:calc(100% - 32px);max-width:100%
  }
  .pron-tip.visible{transform:translate(-50%,0) scale(1)!important}
}

/* ================================================================
   PILL-GRID THEME & FONT SELECTOR
================================================================ */
#themeMenu,#fontMenu{
  min-width:520px;max-width:600px;
  max-height:70vh;
  padding:18px 18px 16px;
  display:flex;flex-direction:column;gap:0
}
.pm-section{margin-bottom:18px}

.pm-label{

}
.pm-grid{display:flex;flex-wrap:wrap;gap:7px}
.pm-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 13px;border-radius:20px;
  border:1.5px solid var(--border);
  background:color-mix(in srgb,var(--text) 3%,transparent);
  color:var(--muted);
  font-size:0.85rem;font-weight:600;
  font-family:inherit;cursor:pointer;
  transition:all 0.15s ease;
  white-space:nowrap;outline:none;line-height:1
}
.pm-pill:hover{
  background:color-mix(in srgb,var(--text) 10%,transparent);
  color:var(--text);
  border-color:color-mix(in srgb,var(--text) 25%,transparent)
}
.pm-pill.sel{
  border-color:var(--c1);
  color:var(--c1);
  background:color-mix(in srgb,var(--c1) 13%,transparent)
}
.pm-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.pm-prev{font-size:1.05rem;line-height:1;display:inline-block}
</style>

<script>
/* ================================================================
   ICONS
================================================================ */
const ICON_SUN=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
const ICON_MOON=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

/* ================================================================
   THEME & FONT CONFIG
================================================================ */
const THEMES=[
  {id:'night',           name:'Night',           type:'dark',  dot:'#58a6ff'},
  {id:'catppuccin',      name:'Catppuccin',       type:'dark',  dot:'#cba6f7'},
  {id:'gruvbox',         name:'Gruvbox',          type:'dark',  dot:'#fabd2f'},
  {id:'tokyo',           name:'Tokyo Night',      type:'dark',  dot:'#7aa2f7'},
  {id:'nord',            name:'Nord',             type:'dark',  dot:'#88c0d0'},
  {id:'dracula',         name:'Dracula',          type:'dark',  dot:'#bd93f9'},
  {id:'rosepine',        name:'Rose Pine',        type:'dark',  dot:'#c4a7e7'},
  {id:'cyberpunk',       name:'Cyberpunk',        type:'dark',  dot:'#00e5ff'},
  {id:'obsidian',        name:'Obsidian',         type:'dark',  dot:'#8ab4f8'},
  {id:'coral-dark',      name:'Coral',            type:'dark',  dot:'#ff7f50'},
  {id:'forest-dark',     name:'Forest',           type:'dark',  dot:'#6bbf8a'},
  {id:'onedark',         name:'One Dark',         type:'dark',  dot:'#61afef'},
  {id:'solarized-dark',  name:'Solarized',        type:'dark',  dot:'#b58900'},
  {id:'monokai',         name:'Monokai',          type:'dark',  dot:'#a6e22e'},
  {id:'kanagawa-dark',   name:'Kanagawa',         type:'dark',  dot:'#7e9cd8'},
  {id:'everforest-dark', name:'Everforest',       type:'dark',  dot:'#a7c080'},
  {id:'material-dark',   name:'Material',         type:'dark',  dot:'#80cbc4'},
  {id:'ayu-dark',        name:'Ayu',              type:'dark',  dot:'#ffcc66'},
  {id:'astral',          name:'Astral',           type:'dark',  dot:'#7df9ff'},
  {id:'midnight',        name:'Midnight',         type:'dark',  dot:'#38bdf8'},
  {id:'eclipse',         name:'Eclipse',          type:'dark',  dot:'#9cdcfe'},
  {id:'nebula',          name:'Nebula',           type:'dark',  dot:'#00d4ff'},
  {id:'paper',           name:'Paper',            type:'light', dot:'#d94a38'},
  {id:'sepia',           name:'Sepia',            type:'light', dot:'#b58900'},
  {id:'minimal-light',   name:'Minimal',          type:'light', dot:'#3b82f6'},
  {id:'catppuccin-latte',name:'Ctp Latte',        type:'light', dot:'#1e66f5'},
  {id:'gruvbox-light',   name:'Gruvbox Lt',       type:'light', dot:'#b57614'},
  {id:'tokyo-day',       name:'Tokyo Day',        type:'light', dot:'#2e7de9'},
  {id:'nord-light',      name:'Nord Light',       type:'light', dot:'#5e81ac'},
  {id:'rosepine-dawn',   name:'Rose Dawn',        type:'light', dot:'#907aaa'},
  {id:'solarized-light', name:'Solarized Lt',     type:'light', dot:'#268bd2'},
  {id:'kanagawa-lotus',  name:'Kng Lotus',        type:'light', dot:'#43436c'},
  {id:'everforest-light',name:'Everforest Lt',    type:'light', dot:'#5c8b65'},
  {id:'material-light',  name:'Material Lt',      type:'light', dot:'#009688'},
  {id:'ayu-light',       name:'Ayu Light',        type:'light', dot:'#f2ae49'},
  {id:'sakura',          name:'Sakura',           type:'light', dot:'#ff69b4'},

];

const FONTS=[
  {id:'kf-sans',      label:'Noto Sans',      short:'Sans',    prev:'あ', family:"'Noto Sans JP',sans-serif"},
  {id:'kf-serif',     label:'Noto Serif',     short:'Serif',   prev:'あ', family:"'Noto Serif JP',serif"},
  {id:'kf-rounded',   label:'M+ Rounded',     short:'Round',   prev:'あ', family:"'M PLUS Rounded 1c',sans-serif"},
  {id:'kf-zen-sans',  label:'Zen Kaku',       short:'Zen',     prev:'あ', family:"'Zen Kaku Gothic New',sans-serif"},
  {id:'kf-shippori',  label:'Shippori Mincho',short:'Shippori',prev:'あ', family:"'Shippori Mincho',serif"},
  {id:'kf-biz-sans',  label:'BIZ UDGothic',   short:'BIZ S',   prev:'あ', family:"'BIZ UDGothic',sans-serif"},
  {id:'kf-biz-serif', label:'BIZ UDMincho',   short:'BIZ M',   prev:'あ', family:"'BIZ UDMincho',serif"},
  {id:'kf-klee',      label:'Klee One',       short:'Klee',    prev:'あ', family:"'Klee One',cursive"},

  {id:'kf-yusei',     label:'Yusei Magic',    short:'Yusei',   prev:'あ', family:"'Yusei Magic',sans-serif"},
  {id:'kf-hachimaru', label:'Hachi Maru Pop', short:'Hachi',   prev:'あ', family:"'Hachi Maru Pop',cursive"},

  {id:'kf-train',     label:'Train One',      short:'Train',   prev:'あ', family:"'Train One',sans-serif"},

  {id:'kf-dotgothic', label:'DotGothic 8-bit',short:'8-bit',   prev:'あ', family:"'DotGothic16',monospace"}
];

/* ── State ── */
let curTheme = localStorage.getItem('kf-theme') || 'night';
let curFont  = localStorage.getItem('kf-font')  || 'kf-sans';
if(!THEMES.find(t=>t.id===curTheme)) curTheme='night';
if(!FONTS.find(f=>f.id===curFont))   curFont='kf-sans';

function applyThemeFont(){
  document.body.className = `theme-${curTheme} ${curFont}`;
  localStorage.setItem('kf-theme', curTheme);
  localStorage.setItem('kf-font',  curFont);
  const t = THEMES.find(x=>x.id===curTheme);
  document.getElementById('themeLabel').textContent = t.name;
  document.getElementById('themeIcon').innerHTML = t.type==='light' ? ICON_SUN : ICON_MOON;
  document.querySelectorAll('#themeMenu .pm-pill').forEach(o=>o.classList.toggle('sel',o.dataset.v===curTheme));
  document.querySelectorAll('#fontMenu .pm-pill').forEach(o=>o.classList.toggle('sel',o.dataset.v===curFont));
  const fo = FONTS.find(x=>x.id===curFont);
  document.getElementById('fontLabel').textContent = fo.label;
}

/* ── Build Theme Menu (pill-grid) ── */
const themeMenu = document.getElementById('themeMenu');
['dark','light'].forEach(type=>{
  const sec=document.createElement('div');sec.className='pm-section';
  const lbl=document.createElement('span');lbl.className='pm-label';
  lbl.textContent=type==='dark'?'Theme — Dark':'Theme — Light';
  sec.appendChild(lbl);
  const grid=document.createElement('div');grid.className='pm-grid';
  THEMES.filter(t=>t.type===type).forEach(t=>{
    const pill=document.createElement('button');
    pill.className='pm-pill'+(t.id===curTheme?' sel':'');
    pill.dataset.v=t.id;pill.tabIndex=0;
    pill.innerHTML=`<span class="pm-dot" style="background:${t.dot}"></span>${t.name}`;
    pill.onclick=()=>{curTheme=t.id;applyThemeFont();closeDropdowns()};
    pill.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();pill.click()}};
    grid.appendChild(pill);
  });
  sec.appendChild(grid);
  themeMenu.appendChild(sec);
});

/* ── Build Font Menu (pill-grid) ── */
const fontMenu = document.getElementById('fontMenu');
const fSecWrap=document.createElement('div');fSecWrap.className='pm-section';
const fLbl=document.createElement('span');fLbl.className='pm-label';fLbl.textContent='Kana Font';
fSecWrap.appendChild(fLbl);
const fGrid=document.createElement('div');fGrid.className='pm-grid';
FONTS.forEach(f=>{
  const pill=document.createElement('button');
  pill.className='pm-pill'+(f.id===curFont?' sel':'');
  pill.dataset.v=f.id;pill.tabIndex=0;
  pill.innerHTML=`<span class="pm-prev" style="font-family:${f.family}">${f.prev}</span>${f.short}`;
  pill.onclick=()=>{curFont=f.id;applyThemeFont();closeDropdowns()};
  pill.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();pill.click()}};
  fGrid.appendChild(pill);
});
fSecWrap.appendChild(fGrid);
fontMenu.appendChild(fSecWrap);

/* ── Dropdown Toggle Logic ── */
function toggleDropdown(wrap,btn){
  const wasOpen=wrap.classList.contains('open');
  closeDropdowns();
  if(!wasOpen){wrap.classList.add('open');btn.classList.add('open');btn.setAttribute('aria-expanded','true')}
}
function closeDropdowns(){
  document.querySelectorAll('.dropdown-wrap').forEach(w=>w.classList.remove('open'));
  document.querySelectorAll('.ctrl-btn').forEach(b=>{b.classList.remove('open');b.setAttribute('aria-expanded','false')});
}
document.getElementById('themeTrigger').onclick=e=>{e.stopPropagation();toggleDropdown(document.getElementById('themeWrap'),document.getElementById('themeTrigger'))};
document.getElementById('fontTrigger').onclick=e=>{e.stopPropagation();toggleDropdown(document.getElementById('fontWrap'),document.getElementById('fontTrigger'))};
document.addEventListener('click',closeDropdowns);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDropdowns()});

/* ================================================================
   TAB SWITCHING
================================================================ */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick=()=>{
    const id=btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active');b.setAttribute('aria-selected','false')});
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');btn.setAttribute('aria-selected','true');
    document.getElementById('tab-'+id).classList.add('active');
    if(id==='practice') document.getElementById('inp').focus();
  };
});

/* ================================================================
   SHARED TTS
================================================================ */
const synth = 'speechSynthesis' in window ? window.speechSynthesis : null;
let jpVoices=[];
function loadVoices(){
  if(!synth)return;
  const vs=synth.getVoices();
  jpVoices=vs.filter(v=>v.lang==='ja-JP'||v.lang==='ja_JP'||v.lang.startsWith('ja'));
}
if(synth){
  synth.onvoiceschanged=loadVoices;
  loadVoices();
}
function speak(t){
  if(!synth)return;
  synth.cancel();
  const u=new SpeechSynthesisUtterance(t+'、');
  u.lang='ja-JP';u.rate=0.85;u.pitch=1.0;u.volume=1.0;
  if(jpVoices.length){
    const pref=jpVoices.find(v=>v.name.includes('Google')||v.name.includes('Premium')||v.name.includes('Kyoko')||v.name.includes('Otoya'))||jpVoices[0];
    u.voice=pref;
  }
  synth.speak(u);
}

/* ── Reference State ── */
let isHiragana=true, refMode='basic', refMap=HIRA_BASIC;
const ROW_HDR_BASIC=['','k','s','t','n','h','m','y','r','w',''];
const ROW_HDR_DAKU=['g','z','d','b','p'];
const ROW_HDR_YOON=['ky','sh','ch','ny','hy','my','ry','gy','j','by','py'];
const ROW_HDR_EXT=['v','f','misc','t/d','xtra'];
const COL_HDR=['','a','i','u','e','o'];

function computeMap(){
  refMap=isHiragana
    ? (refMode==='basic'?HIRA_BASIC:refMode==='dakuten'?HIRA_DAKU:refMode==='yoon'?HIRA_YOON:HIRA_EXT)
    : (refMode==='basic'?KATA_BASIC:refMode==='dakuten'?KATA_DAKU:refMode==='yoon'?KATA_YOON:KATA_EXT);
}

function renderGrid(){
  const grid=document.getElementById('kana-grid');
  grid.innerHTML='';
  COL_HDR.forEach(t=>{
    const h=document.createElement('div');h.className='grid-hdr col-hdr';h.textContent=t;grid.appendChild(h);
  });
  const rowH=refMode==='basic'?ROW_HDR_BASIC:refMode==='dakuten'?ROW_HDR_DAKU:refMode==='yoon'?ROW_HDR_YOON:ROW_HDR_EXT;
  for(let i=0;i<refMap.length;i+=5){
    const rh=document.createElement('div');rh.className='grid-hdr row-hdr';rh.textContent=rowH[Math.floor(i/5)]||'';grid.appendChild(rh);
    for(let j=0;j<5;j++){
      const item=refMap[i+j];
      const d=document.createElement('div');
      if(!item){d.className='kana-cell empty';}
      else{
        d.className='kana-cell';d.tabIndex=0;
        d.innerHTML=`<div class="info-btn" aria-label="Pronunciation info" tabindex="0"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></div><div class="kana-char">${item.k}</div><div class="kana-romaji">${item.r}</div>`;
        d.onclick=()=>speak(item.k);
        d.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();speak(item.k)}};
        const ib=d.querySelector('.info-btn');
        ib.onclick=e=>{e.stopPropagation();showPronTip(e,item.r)};
        ib.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();e.stopPropagation();showPronTip(e,item.r)}};
      }
      grid.appendChild(d);
    }
  }
}

/* Pronunciation Tip */
const pronTip=document.getElementById('pron-tip');
function showPronTip(e,romaji){
  e.preventDefault();
  if(pronTip.classList.contains('visible')&&pronTip.dataset.r===romaji){
    pronTip.classList.remove('visible');pronTip.dataset.r='';return;
  }
  pronTip.dataset.r=romaji;
  const info=KANA_INFO[romaji];
  if(!info){
    pronTip.innerHTML=`<div class="tip-header"><span class="romaji-hl">${romaji}</span></div><div class="tip-desc">Pronunciation tip not available.</div>`;
  } else {
    let exL=isHiragana?info.h_ex:info.k_ex;
    if(!exL||!exL.length)exL=isHiragana?info.k_ex:info.h_ex;
    const exSliced=exL&&exL.length?exL.slice(0,3):[];
    const exHtml=exSliced.length?'<div class="tip-examples">'+exSliced.map(ex=>`<div class="ex-item" tabindex="0" onclick="speak('${ex.j}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();speak('${ex.j}');}"><span class="ex-jp">${ex.j}</span><span class="ex-ro">${ex.r}</span><span class="ex-en">${ex.m}</span></div>`).join('')+'</div>':'';
    pronTip.innerHTML=`<div class="tip-header"><span class="romaji-hl">${romaji}</span></div><div class="tip-desc">${info.d}</div>${exHtml}`;
  }
  pronTip.style.left='-9999px';pronTip.style.top='-9999px';
  pronTip.classList.add('visible');
  requestAnimationFrame(()=>{
    if(window.innerWidth>600){
      const r=pronTip.getBoundingClientRect(),vw=document.documentElement.clientWidth,vh=document.documentElement.clientHeight,off=14;
      let x=e.clientX+off,y=e.clientY+off;
      if(x+r.width>vw-off)x=e.clientX-r.width-off;
      if(y+r.height>vh-off)y=e.clientY-r.height-off;
      x=Math.max(off,Math.min(x,vw-r.width-off));y=Math.max(off,Math.min(y,vh-r.height-off));
      pronTip.style.left=x+'px';pronTip.style.top=y+'px';
    }
  });
}
document.addEventListener('click',e=>{if(!pronTip.contains(e.target)){pronTip.classList.remove('visible');pronTip.dataset.r=''}});

/* Reference Buttons */
document.getElementById('scriptToggle').onclick=function(){
  isHiragana=!isHiragana;this.textContent=isHiragana?'Hiragana':'Katakana';
  computeMap();renderGrid();
};
['basic','dakuten','yoon','extended'].forEach(m=>{
  const id=m==='basic'?'basicBtn':m==='dakuten'?'dakutenBtn':m==='yoon'?'yoonBtn':'extendedBtn';
  document.getElementById(id).onclick=function(){
    refMode=m;
    document.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    computeMap();renderGrid();
  };
});

    ky:     {l:'ヤ ya', c:{'ヤ':'ya','ユ':'yu','ヨ':'yo'}},
    kr:     {l:'ラ ra', c:{'ラ':'ra','リ':'ri','ル':'ru','レ':'re','ロ':'ro'}},
    kw:     {l:'ワ wa', c:{'ワ':'wa','ヲ':'o'}},
    kn1:    {l:'ン n',  c:{'ン':'n'}},
    kg:     {l:'ガ ga', c:{'ガ':'ga','ギ':'gi','グ':'gu','ゲ':'ge','ゴ':'go'}},
    kz:     {l:'ザ za', c:{'ザ':'za','ジ':'ji','ズ':'zu','ゼ':'ze','ゾ':'zo'}},
    kd:     {l:'ダ da', c:{'ダ':'da','ヂ':'ji','ヅ':'zu','デ':'de','ド':'do'}},
    kb:     {l:'バ ba', c:{'バ':'ba','ビ':'bi','ブ':'bu','ベ':'be','ボ':'bo'}},
    kp:     {l:'パ pa', c:{'パ':'pa','ピ':'pi','プ':'pu','ペ':'pe','ポ':'po'}},
  },
  kc:{
    kdk:{l:'キャ kya',c:{'キャ':'kya','キュ':'kyu','キョ':'kyo'}},
    kds:{l:'シャ sha',c:{'シャ':'sha','シュ':'shu','ショ':'sho'}},
    kdc:{l:'チャ cha',c:{'チャ':'cha','チュ':'chu','チョ':'cho'}},
    kdn:{l:'ニャ nya',c:{'ニャ':'nya','ニュ':'nyu','ニョ':'nyo'}},
    kdh:{l:'ヒャ hya',c:{'ヒャ':'hya','ヒュ':'hyu','ヒョ':'hyo'}},
    kdm:{l:'ミャ mya',c:{'ミャ':'mya','ミュ':'myu','ミョ':'myo'}},
    kdr:{l:'リャ rya',c:{'リャ':'rya','リュ':'ryu','リョ':'ryo'}},
    kdg:{l:'ギャ gya',c:{'ギャ':'gya','ギュ':'gyu','ギョ':'gyo'}},
    kdj:{l:'ジャ ja', c:{'ジャ':'ja','ジュ':'ju','ジョ':'jo'}},
    kdj2:{l:'ヂャ ja',c:{'ヂャ':'ja','ヂュ':'ju','ヂョ':'jo'}},
    kdb:{l:'ビャ bya',c:{'ビャ':'bya','ビュ':'byu','ビョ':'byo'}},
    kdp:{l:'ピャ pya',c:{'ピャ':'pya','ピュ':'pyu','ピョ':'pyo'}},
  }
};

const REP={'o':['wo'],'chi':['ci'],'shi':['si'],'tsu':['tu'],'zu':['du'],'ji':['di','zi'],'fu':['hu'],'ja':['dya'],'jo':['dyo'],'ju':['dyu']};
const GL={h:'hiragana',hc:'hiragana combo',k:'katakana',kc:'katakana combo'};

/* Build kana selection grids */
function buildSelGrid(grp,gid){
  const g=document.getElementById(gid);g.innerHTML='';
  Object.entries(KD[grp]).forEach(([id,{l,c}])=>{
    const[jp,rm]=l.split(' ');
    const w=document.createElement('div');w.className='kopt';
    const inp=document.createElement('input');inp.type='checkbox';inp.id=id;inp.dataset.g=grp;
    inp.addEventListener('change',()=>{saveChk();rebuildPool()});
    const lbl=document.createElement('label');lbl.htmlFor=id;lbl.className='klbl';
    lbl.innerHTML=`<span class="kjp">${jp}</span><span class="krm">${rm}</span>`;
    lbl.addEventListener('mouseenter',()=>showQuizTT(lbl,c));
    lbl.addEventListener('mouseleave',hideQuizTT);
    w.appendChild(inp);w.appendChild(lbl);g.appendChild(w);
  });
}
buildSelGrid('h','hg');buildSelGrid('hc','hcg');buildSelGrid('k','kg');buildSelGrid('kc','kcg');

/* Quiz hover tooltip */
const quizTT=document.getElementById('quiz-tt');
let quizTTH=null;
function showQuizTT(el,chars){
  clearTimeout(quizTTH);
  quizTT.innerHTML=Object.entries(chars).map(([ch,rm])=>`<span class="tt-jp">${ch}</span><span class="tt-rm">${rm}</span>`).join('');
  quizTT.style.display='grid';
  const r=el.getBoundingClientRect(),tw=quizTT.offsetWidth||100,th=quizTT.offsetHeight||60;
  let l=r.left+r.width/2-tw/2,t=r.top-th-8;
  if(l<6)l=6;if(l+tw>window.innerWidth-6)l=window.innerWidth-tw-6;
  if(t<6)t=r.bottom+8;if(t+th>window.innerHeight-6)t=window.innerHeight-th-6;
  quizTT.style.left=l+'px';quizTT.style.top=t+'px';
}
function hideQuizTT(){quizTTH=setTimeout(()=>quizTT.style.display='none',80)}

/* Kana selection save/load */
function saveChk(){document.querySelectorAll('#optbody input[type=checkbox]').forEach(c=>localStorage.setItem('kf-sel-'+c.id,c.checked?'1':'0'))}
function loadChk(){
  let any=false;
  document.querySelectorAll('#optbody input[type=checkbox]').forEach(c=>{
    const v=localStorage.getItem('kf-sel-'+c.id);
    if(v!==null){c.checked=v==='1';any=true;}
  });
  if(!any)document.getElementById('hsingle').checked=true;
}
function chkAll(g){document.querySelectorAll(`input[data-g="${g}"]`).forEach(c=>c.checked=true);saveChk();rebuildPool()}
function uchkAll(g){document.querySelectorAll(`input[data-g="${g}"]`).forEach(c=>c.checked=false);saveChk();rebuildPool()}

/* Pool */
let pool=[],queue=[],curCh=null,curRd=null,curGrp=null;
let totAns=0,totCor=0,streak=0,isWrong=false,revealed=false;

function buildPool(){
  pool=[];
  document.querySelectorAll('#optbody input[type=checkbox]:checked').forEach(cb=>{
    for(const[g,gd]of Object.entries(KD)){
      if(gd[cb.id])for(const[ch,rd]of Object.entries(gd[cb.id].c))pool.push({ch,rd,g});
    }
  });
  if(!pool.length){document.getElementById('hsingle').checked=true;saveChk();buildPool()}
}
function rebuildPool(){buildPool();queue=[]}
function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function nextQ(){
  if(!queue.length)queue=shuffle(pool);
  if(curCh&&queue[0]&&queue[0].ch===curCh&&queue.length>1)queue.shift();
  const it=queue.shift();curCh=it.ch;curRd=it.rd;curGrp=it.g;renderQ();
}

function renderQ(){
  const el=document.getElementById('kc');
  el.classList.remove('kin','shk','cfl');void el.offsetWidth;el.classList.add('kin');
  el.textContent=curCh;
  document.getElementById('tl').textContent=GL[curGrp]||'';
  hideRv();isWrong=false;revealed=false;
  const inp=document.getElementById('inp');
  inp.value='';inp.className='';inp.placeholder='type romaji…';inp.focus();
  document.getElementById('cfr').innerHTML='';
  document.getElementById('msg').textContent='Hover the character to peek at its reading';
  document.getElementById('msg').className='quiz-msg';
  document.getElementById('skbtn').style.display='none';
  document.getElementById('rbtn').style.display='';
  updateStats();
}

/* Reveal */
const kcEl=document.getElementById('kc');
kcEl.addEventListener('mouseenter',showRv);
kcEl.addEventListener('mouseleave',()=>{if(!revealed)hideRv()});
kcEl.addEventListener('click',()=>{revealed=!revealed;revealed?showRv():hideRv()});
function showRv(){const r=document.getElementById('rv');r.textContent=curRd;r.classList.add('show')}
function hideRv(){document.getElementById('rv').classList.remove('show')}
function toggleReveal(){revealed=!revealed;revealed?showRv():hideRv()}

/* Audio */
let jpVoice=null;
function initQVoices(){const vs=speechSynthesis.getVoices();jpVoice=vs.find(v=>v.lang==='ja-JP')||vs.find(v=>v.lang.startsWith('ja'))||null}
if('speechSynthesis'in window){speechSynthesis.addEventListener('voiceschanged',initQVoices);initQVoices()}
function playAudio(){
  if(!('speechSynthesis'in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(curCh);
  u.lang='ja-JP';u.rate=0.8;u.pitch=1;
  if(jpVoice)u.voice=jpVoice;
  speechSynthesis.speak(u);
  const b=document.getElementById('sndbtn');
  b.classList.add('pulse');setTimeout(()=>b.classList.remove('pulse'),500);
}

/* Input */
function getPoss(rd){const p=[rd];if(REP[rd])p.push(...REP[rd]);return p}

document.getElementById('inp').addEventListener('input',function(){if(isWrong)return;checkLive(this.value.toLowerCase())});
document.getElementById('inp').addEventListener('keydown',function(e){
  if(e.key==='Enter'||(e.key===' '&&!this.value)){e.preventDefault();isWrong?qSkip():qSubmit(this.value.toLowerCase())}
  if(e.key==='?'){e.preventDefault();toggleReveal()}
  if(e.key.toLowerCase()==='p'&&!this.value){e.preventDefault();playAudio()}
});
document.addEventListener('keydown',function(e){
  const inp=document.getElementById('inp');
  if(document.getElementById('tab-practice').classList.contains('active')){
    if(e.key==='Escape'){if(isWrong)qSkip();inp.focus();return}
    if(document.activeElement!==inp&&e.key.length===1&&!e.ctrlKey&&!e.metaKey)inp.focus();
  }
});

function checkLive(typed){
  const poss=getPoss(curRd),cfr=document.getElementById('cfr');
  if(!typed){cfr.innerHTML='';document.getElementById('inp').className='';return}
  let best=poss[0];
  for(const p of poss){if(p.startsWith(typed.slice(0,p.length))){best=p;break}}
  cfr.innerHTML=typed.split('').map((tc,i)=>tc===best[i]?`<span class="c-ok">${tc}</span>`:`<span class="c-no">${tc}</span>`).join('');
  for(const p of poss){if(p===typed){qSubmit(typed);return}}
  document.getElementById('inp').className=poss.some(p=>p.startsWith(typed))?'':'no';
}

function qSubmit(typed){
  const poss=getPoss(curRd),ok=poss.some(p=>p===typed);
  totAns++;
  if(ok){
    totCor++;streak++;
    const el=document.getElementById('kc');el.classList.add('cfl');
    showRv();updateStats();setTimeout(nextQ,165);
  } else {
    isWrong=true;streak=0;
    document.getElementById('kc').classList.add('shk');showRv();
    const inp=document.getElementById('inp');inp.className='no';inp.value=typed;
    const msg=document.getElementById('msg');msg.className='quiz-msg err';
    msg.innerHTML=`${curCh} = <span class="ans">${curRd}</span> &mdash; Enter to continue`;
    document.getElementById('skbtn').style.display='';
    document.getElementById('rbtn').style.display='none';
    updateStats();
    const req={ch:curCh,rd:curRd,g:curGrp};
    if(queue.length>3)queue.splice(3,0,req);else queue.push(req);
    if(queue.length>13)queue.splice(13,0,req);
  }
}
function qSkip(){if(!isWrong)return;nextQ()}

function updateStats(){
  document.getElementById('sv').textContent=totCor;
  document.getElementById('tv').textContent=totAns;
  document.getElementById('af').style.width=(totAns>0?totCor/totAns*100:0)+'%';
  document.getElementById('stv').textContent=streak;
  document.getElementById('stk').classList.toggle('hot',streak>=5);
}

function toggleOpt(){
  document.getElementById('optbody').classList.toggle('open');
  document.getElementById('optog').classList.toggle('open');
}

/* Reset stats */
document.getElementById('resetStats').onclick=()=>{
  totAns=0;totCor=0;streak=0;updateStats();
  queue=[];nextQ();
};

/* ================================================================
   INIT
================================================================ */
applyThemeFont();
computeMap();
renderGrid();
loadChk();
buildPool();
nextQ();
</script>
</body>
</html>
